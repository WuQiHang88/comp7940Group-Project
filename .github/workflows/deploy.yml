name: AWS EC2 Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy with Docker
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          cd ~/comp7940Group-Project
          git pull origin main
          sudo docker stop emotion-bot || true
          sudo docker rm emotion-bot || true
          sudo docker build -t emotion-bot .
          sudo docker run -d \
            --name emotion-bot \
            --restart always \
            -v ./config.ini:/app/config.ini \
            emotion-bot
          EOF